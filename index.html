<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird Clone</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #70c5ce;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 2px solid #000;
            background-color: #fff;
            display: block;
        }
        #ui {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
            width: 100%;
        }
        h1 {
            margin: 0;
            color: white;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 id="score">Score: 0</h1>
    </div>
    <canvas id="gameCanvas" width="320" height="480"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Game constants
        const GRAVITY = 0.25;
        const JUMP = -4.5;
        const PIPE_SPEED = 2;
        const PIPE_SPAWN_RATE = 90; // frames
        const PIPE_WIDTH = 50;
        const PIPE_GAP = 120;

        // Game state
        let bird = { x: 50, y: 150, width: 20, height: 20, velocity: 0 };
        let pipes = [];
        let score = 0;
        let frameCount = 0;
        let gameOver = false;

        function resetGame() {
            bird = { x: 50, y: 150, width: 20, height: 20, velocity: 0 };
            pipes = [];
            score = 0;
            frameCount = 0;
            gameOver = false;
            scoreElement.innerText = "Score: 0";
            requestAnimationFrame(update);
        }

        function drawBird() {
            ctx.fillStyle = "#FFD700";
            ctx.fillRect(bird.x, bird.y, bird.width, bird.height);
            ctx.strokeStyle = "#000";
            ctx.strokeRect(bird.x, bird.y, bird.width, bird.height);
        }

        function drawPipes() {
            ctx.fillStyle = "#2ecc71";
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.top);
                ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.top);
                
                // Bottom pipe
                const bottomY = pipe.top + PIPE_GAP;
                ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, canvas.height - bottomY);
                ctx.strokeRect(pipe.x, bottomY, PIPE_WIDTH, canvas.height - bottomY);
            });
        }

        function update() {
            if (gameOver) {
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "30px Arial";
                ctx.fillText("Game Over", canvas.width / 2 - 75, canvas.height / 2);
                ctx.font = "20px Arial";
                ctx.fillText("Click to Restart", canvas.width / 2 - 65, canvas.height / 2 + 40);
                return;
            }

            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;

            // Collision with ground or ceiling
            if (bird.y + bird.height > canvas.height || bird.y < 0) {
                gameOver = true;
            }

            // Pipe management
            if (frameCount % PIPE_SPAWN_RATE === 0) {
                const minPipeHeight = 50;
                const maxPipeHeight = canvas.height - PIPE_GAP - minPipeHeight;
                const topHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1)) + minPipeHeight;
                pipes.push({ x: canvas.width, top: topHeight, passed: false });
            }

            pipes.forEach((pipe, index) => {
                pipe.x -= PIPE_SPEED;

                // Collision detection
                if (
                    bird.x < pipe.x + PIPE_WIDTH &&
                    bird.x + bird.width > pipe.x &&
                    (bird.y < pipe.top || bird.y + bird.height > pipe.top + PIPE_GAP)
                ) {
                    gameOver = true;
                }

                // Score increment
                if (!pipe.passed && bird.x > pipe.x + PIPE_WIDTH) {
                    score++;
                    pipe.passed = true;
                    scoreElement.innerText = "Score: " + score;
                }

                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(index, 1);
                }
            });

            // Draw everything
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawBird();

            frameCount++;
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (gameOver) resetGame();
                else bird.velocity = JUMP;
            }
        });

        canvas.addEventListener('mousedown', () => {
            if (gameOver) resetGame();
            else bird.velocity = JUMP;
        });

        update();
    </script>
</body>
</html>
