<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Flappy Bird Ultra</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: #1a1a2e;
            font-family: 'Arial Black', Gadget, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }
        #score {
            font-size: 10vh;
            margin-top: 5vh;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.5);
            font-weight: bold;
        }
        #message-box {
            position: absolute;
            top: 40%;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 3vh 5vw;
            border-radius: 20px;
            border: 4px solid #fff;
        }
        .title { font-size: 5vh; margin-bottom: 1vh; color: #f1c40f; }
        .hint { font-size: 2.5vh; opacity: 0.8; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div id="score">0</div>
            <div id="message-box">
                <div class="title" id="mainTitle">FLAPPY BIRD</div>
                <div class="hint" id="hintText">TAP TO FLY</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const scoreElement = document.getElementById('score');
        const mainTitle = document.getElementById('mainTitle');
        const hintText = document.getElementById('hintText');
        const messageBox = document.getElementById('message-box');

        let gravity, jumpPower, pipeSpeedBase, pipeWidth, pipeGap, birdX;
        let bird = { x: 0, y: 0, w: 0, h: 0, vel: 0, rot: 0, dead: false };
        let pipes = [], score = 0, gameState = 'START', lastTime = 0, pipeSpeed = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gravity = canvas.height * 2.5; 
            jumpPower = canvas.height * -0.6;
            pipeSpeedBase = canvas.width * 0.4;
            pipeWidth = Math.min(canvas.width * 0.15, 80);
            pipeGap = canvas.height * 0.28;
            birdX = canvas.width * 0.2;
        }

        function drawBird(dt) {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            bird.rot = Math.min(Math.PI / 2, Math.max(-Math.PI / 6, bird.vel * 0.001));
            ctx.rotate(bird.rot);

            // Body
            ctx.fillStyle = "#f1c40f";
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.h*0.6, bird.h*0.5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();

            // Eye / X if dead
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(bird.w*0.2, -bird.h*0.1, bird.h*0.15, 0, Math.PI*2);
            ctx.fill(); ctx.stroke();
            
            if(bird.dead) {
                ctx.strokeStyle = "black";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(bird.w*0.15, -bird.h*0.15); ctx.lineTo(bird.w*0.25, -bird.h*0.05);
                ctx.moveTo(bird.w*0.25, -bird.h*0.15); ctx.lineTo(bird.w*0.15, -bird.h*0.05);
                ctx.stroke();
            } else {
                ctx.fillStyle = "black";
                ctx.beginPath();
                ctx.arc(bird.w*0.25, -bird.h*0.1, bird.h*0.05, 0, Math.PI*2);
                ctx.fill();
            }

            ctx.restore();
        }

        function resetGame() {
            bird.y = canvas.height / 2;
            bird.vel = 0;
            bird.dead = false;
            pipes = [];
            score = 0;
            scoreElement.innerText = "0";
            messageBox.style.display = 'none';
            gameState = 'PLAYING';
        }

        function hit() {
            bird.dead = true;
            gameState = 'GAMEOVER';
            mainTitle.innerText = "CRASHED!";
            hintText.innerText = "TAP TO RETRY";
            messageBox.style.display = 'block';
        }

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;

            // Clear screen
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if(gameState === 'PLAYING') {
                bird.vel += gravity * dt;
                bird.y += bird.vel * dt;
                if(bird.y > canvas.height || bird.y < 0) hit();
            }

            drawBird(dt);
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', resize);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); (gameState === 'PLAYING') ? bird.vel = jumpPower : resetGame(); });
        canvas.addEventListener('mousedown', () => { (gameState === 'PLAYING') ? bird.vel = jumpPower : resetGame(); });

        resize();
        bird.h = canvas.height * 0.08;
        bird.w = bird.h;
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
