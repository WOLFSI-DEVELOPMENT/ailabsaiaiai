<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Ultra Fullscreen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            z-index: 10;
        }
        .score-container {
            font-size: 80px;
            font-weight: 900;
            text-shadow: 0 4px 0 #2c3e50, 0 0 20px rgba(255,255,255,0.3);
            font-family: 'Courier New', Courier, monospace;
        }
        .high-score {
            font-size: 20px;
            opacity: 0.9;
            background: rgba(0,0,0,0.3);
            padding: 6px 16px;
            border-radius: 20px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        .title {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff 0%, #bdc3c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }
        .hint {
            font-size: 24px;
            letter-spacing: 2px;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div class="score-container" id="score">0</div>
            <div class="high-score">Best: <span id="highScore">0</span></div>
            <div id="message">
                <div class="title" id="mainTitle">FLAPPY ULTRA</div>
                <div class="hint" id="hintText">TAP TO START</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const mainTitle = document.getElementById('mainTitle');
        const hintText = document.getElementById('hintText');

        // Dynamic Sizing Logic
        let scale = 1;
        let baseHeight = 640;
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            scale = canvas.height / baseHeight;
            preRender(); // Redraw assets for new scale
        }

        // Game constants (Relative to scale)
        const getGravity = () => 1800 * scale;
        const getJump = () => -450 * scale;
        const getPipeSpeedBase = () => 200 * scale;
        const getPipeWidth = () => 70 * scale;
        const getPipeGap = () => 170 * scale;
        const getBirdX = () => 80 * scale;
        const getBirdSize = () => ({ w: 40 * scale, h: 30 * scale });

        const PIPE_SPAWN_INTERVAL = 1.6;

        // Game state
        let bird = { x: 0, y: 0, w: 0, h: 0, vel: 0, rot: 0 };
        let pipes = [];
        let particles = [];
        let clouds = [];
        let score = 0;
        let highScore = localStorage.getItem('flappyHighScore') || 0;
        let gameState = 'START';
        let lastTime = 0;
        let spawnTimer = 0;
        let pipeSpeed = 0;
        let shake = 0;

        highScoreElement.innerText = highScore;

        // Assets
        const birdCanvas = document.createElement('canvas');
        const pipeCanvas = document.createElement('canvas');
        
        function preRender() {
            const bSize = getBirdSize();
            birdCanvas.width = bSize.w * 1.5;
            birdCanvas.height = bSize.h * 1.5;
            const bctx = birdCanvas.getContext('2d');
            const bx = birdCanvas.width / 2;
            const by = birdCanvas.height / 2;
            
            bctx.fillStyle = "#f1c40f";
            bctx.strokeStyle = "#000";
            bctx.lineWidth = 2 * scale;
            bctx.beginPath();
            bctx.ellipse(bx, by, bSize.w / 2, bSize.h / 2, 0, 0, Math.PI * 2);
            bctx.fill();
            bctx.stroke();

            // Eye
            bctx.fillStyle = "white";
            bctx.beginPath();
            bctx.arc(bx + 8 * scale, by - 5 * scale, 5 * scale, 0, Math.PI * 2);
            bctx.fill();
            bctx.stroke();
            bctx.fillStyle = "black";
            bctx.beginPath();
            bctx.arc(bx + 10 * scale, by - 5 * scale, 2 * scale, 0, Math.PI * 2);
            bctx.fill();

            // Beak
            bctx.fillStyle = "#e67e22";
            bctx.beginPath();
            bctx.moveTo(bx + 12 * scale, by);
            bctx.lineTo(bx + 22 * scale, by + 2 * scale);
            bctx.lineTo(bx + 12 * scale, by + 6 * scale);
            bctx.closePath();
            bctx.fill();
            bctx.stroke();

            // Pipe
            pipeCanvas.width = getPipeWidth();
            pipeCanvas.height = canvas.height;
            const pctx = pipeCanvas.getContext('2d');
            const grad = pctx.createLinearGradient(0, 0, pipeCanvas.width, 0);
            grad.addColorStop(0, '#2ecc71');
            grad.addColorStop(0.4, '#a2f58d');
            grad.addColorStop(0.6, '#27ae60');
            grad.addColorStop(1, '#1b5e20');
            pctx.fillStyle = grad;
            pctx.fillRect(0, 0, pipeCanvas.width, pipeCanvas.height);
            pctx.strokeStyle = "rgba(0,0,0,0.3)";
            pctx.lineWidth = 2 * scale;
            pctx.strokeRect(2, 0, pipeCanvas.width - 4, pipeCanvas.height);
        }

        // Initialize clouds
        function initClouds() {
            clouds = [];
            for(let i=0; i<8; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height * 0.4),
                    s: (30 + Math.random() * 50) * scale,
                    v: (15 + Math.random() * 25) * scale
                });
            }
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 400 * scale,
                    vy: (Math.random() - 0.5) * 400 * scale,
                    life: 1.0,
                    size: (Math.random() * 5 + 2) * scale,
                    color: color
                });
            }
        }

        function resetGame() {
            const bSize = getBirdSize();
            bird = { x: getBirdX(), y: canvas.height / 2, w: bSize.w, h: bSize.h, vel: 0, rot: 0 };
            pipes = [];
            particles = [];
            score = 0;
            spawnTimer = 0;
            pipeSpeed = getPipeSpeedBase();
            gameState = 'PLAYING';
            scoreElement.innerText = "0";
            mainTitle.style.display = 'none';
            hintText.style.display = 'none';
        }

        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            bird.rot = Math.min(Math.PI / 3, Math.max(-Math.PI / 6, bird.vel * 0.0015));
            ctx.rotate(bird.rot);

            const wingOsc = Math.sin(Date.now() * 0.015) * 10 * scale;
            
            ctx.drawImage(birdCanvas, -birdCanvas.width/2, -birdCanvas.height/2);

            // Wing
            ctx.fillStyle = "white";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.ellipse(-8 * scale, 2 * scale, 10 * scale, Math.max(2, 6 * scale + wingOsc), 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.restore();
        }

        function drawPipes() {
            const pw = getPipeWidth();
            const pg = getPipeGap();
            pipes.forEach(p => {
                // Top
                ctx.drawImage(pipeCanvas, 0, 0, pw, p.top, p.x, 0, pw, p.top);
                // Cap
                ctx.fillStyle = '#2ecc71';
                ctx.strokeStyle = '#1b5e20';
                ctx.lineWidth = 2 * scale;
                ctx.fillRect(p.x - 5 * scale, p.top - 25 * scale, pw + 10 * scale, 25 * scale);
                ctx.strokeRect(p.x - 5 * scale, p.top - 25 * scale, pw + 10 * scale, 25 * scale);

                // Bottom
                const botY = p.top + pg;
                const botH = canvas.height - botY;
                ctx.drawImage(pipeCanvas, 0, 0, pw, botH, p.x, botY, pw, botH);
                // Cap
                ctx.fillRect(p.x - 5 * scale, botY, pw + 10 * scale, 25 * scale);
                ctx.strokeRect(p.x - 5 * scale, botY, pw + 10 * scale, 25 * scale);
            });
        }

        function drawBackground(dt) {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#4facfe');
            skyGrad.addColorStop(1, '#00f2fe');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
            clouds.forEach(c => {
                c.x -= c.v * dt;
                if (c.x + c.s < -100) c.x = canvas.width + 100;
                
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.s * 0.5, 0, Math.PI * 2);
                ctx.arc(c.x + c.s * 0.3, c.y - c.s * 0.2, c.s * 0.4, 0, Math.PI * 2);
                ctx.arc(c.x + c.s * 0.6, c.y, c.s * 0.4, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = "rgba(46, 204, 113, 0.15)";
            for(let i=0; i<4; i++) {
                const speed = (0.01 + i * 0.005);
                const x = ((Date.now() * speed + i * 500) % (canvas.width + 400)) - 200;
                ctx.beginPath();
                ctx.moveTo(canvas.width - x, canvas.height);
                ctx.lineTo(canvas.width - x + 150 * scale, canvas.height - 200 * scale);
                ctx.lineTo(canvas.width - x + 300 * scale, canvas.height);
                ctx.fill();
            }
        }

        function updateParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt * 1.5;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop(timestamp) {
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;

            ctx.save();
            if (shake > 0) {
                ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
                shake *= 0.9;
            }

            drawBackground(dt);

            if (gameState === 'START') {
                if (bird.w === 0) { // Initial set
                    const bSize = getBirdSize();
                    bird = { x: getBirdX(), y: canvas.height/2, w: bSize.w, h: bSize.h, vel: 0, rot: 0 };
                }
                drawBird();
            } 
            else if (gameState === 'PLAYING') {
                bird.vel += getGravity() * dt;
                bird.y += bird.vel * dt;

                if (bird.y + bird.h/2 > canvas.height || bird.y - bird.h/2 < 0) hit();

                spawnTimer += dt;
                if (spawnTimer >= PIPE_SPAWN_INTERVAL) {
                    const pw = getPipeWidth();
                    const pg = getPipeGap();
                    const minH = 100 * scale;
                    const maxH = canvas.height - pg - minH - 50 * scale;
                    const top = Math.floor(Math.random() * (maxH - minH + 1)) + minH;
                    pipes.push({ x: canvas.width, top: top, passed: false });
                    spawnTimer = 0;
                }

                const pw = getPipeWidth();
                const pg = getPipeGap();
                pipes.forEach((p, index) => {
                    p.x -= pipeSpeed * dt;

                    const hitP = 6 * scale;
                    if (bird.x + bird.w/2 - hitP > p.x && bird.x - bird.w/2 + hitP < p.x + pw) {
                        if (bird.y - bird.h/2 + hitP < p.top || bird.y + bird.h/2 - hitP > p.top + pg) hit();
                    }

                    if (!p.passed && bird.x > p.x + pw) {
                        score++;
                        p.passed = true;
                        scoreElement.innerText = score;
                        pipeSpeed += 5 * scale;
                        createParticles(p.x + pw, bird.y, '#f1c40f', 5);
                        if (score > highScore) {
                            highScore = score;
                            localStorage.setItem('flappyHighScore', highScore);
                            highScoreElement.innerText = highScore;
                        }
                    }
                    if (p.x + pw < -100) pipes.splice(index, 1);
                });

                drawPipes();
                updateParticles(dt);
                drawBird();
            } 
            else if (gameState === 'GAMEOVER') {
                drawPipes();
                updateParticles(dt);
                drawBird();
            }

            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        function hit() {
            if (gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            shake = 20 * scale;
            createParticles(bird.x, bird.y, '#ff4757', 25);
            mainTitle.innerText = "GAME OVER";
            mainTitle.style.display = 'block';
            hintText.innerText = "TAP TO RESTART";
            hintText.style.display = 'block';
        }

        function jump() {
            if (gameState === 'START' || gameState === 'GAMEOVER') {
                resetGame();
            } else {
                bird.vel = getJump();
                createParticles(bird.x - 10 * scale, bird.y + 10 * scale, 'rgba(255,255,255,0.5)', 3);
            }
        }

        window.addEventListener('resize', () => {
            resize();
            initClouds();
        });
        window.addEventListener('keydown', e => { if(e.code === 'Space' || e.code === 'ArrowUp') jump(); });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive: false});
        canvas.addEventListener('mousedown', e => { if(e.button === 0) jump(); });

        resize();
        initClouds();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
